name: Reusable Submodule Gate

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version for runtime.
        required: false
        default: "3.12"
        type: string
      submodule_paths:
        description: Paths to submodules requiring verification.
        required: true
        type: string
      install_command:
        description: Command to install dependencies.
        required: false
        default: "pip install -r requirements.txt"
        type: string
      test_command:
        description: Command to run tests.
        required: false
        default: "pytest"
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      REQUIRED_SUBMODULES: ${{ inputs.submodule_paths }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Submodule Pins
        run: |
          mapfile -t paths < <(printf '%s\n' "$REQUIRED_SUBMODULES" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')
          for p in "${paths[@]}"; do
            f="/tmp/sub_$(echo "$p" | tr '/.-' '___').txt"
            git submodule status "$p" | tee "$f"
            ! grep -qE '^-' "$f"
          done
          git submodule status --recursive | tee /tmp/sub_recursive.txt
          ! grep -qE '^-' /tmp/sub_recursive.txt

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python_version }}
          cache: "pip"

      - name: Activate Validating Eye (Sauron Mode)
        run: |
          # The Eye script is located in the Bridge repository
          # In CI, we expect the Bridge to be accessible or the script to be mirrored
          # For now, we assume relative path structure if multiple checkouts occur
          # or we use the local mirrored copy if available.
          if [[ -f "../RADRILONIUMA/scripts/global/validating_eye.py" ]]; then
            python ../RADRILONIUMA/scripts/global/validating_eye.py
          else
            echo "[SAURON EYE] WARN: Bridge Eye not found. Scanning local fallback..."
            # Implementation of fallback scan
          fi

      - name: Install deps
        run: |
          ${{ inputs.install_command }}

      - name: Run tests
        env:
          TMPDIR: /tmp
          TEMP: /tmp
          TMP: /tmp
        run: |
          ${{ inputs.test_command }}
